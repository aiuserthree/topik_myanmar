<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>시험 접수 완료 — TOPIK Myanmar</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#CD2E3A;--navy:#003478;--gold:#C8963E;--gray-bg:#f4f6f9;--gray-light:#e8ecf0;--gray-text:#6b7280;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-bg);color:#1a1a2e;}
    svg.icon{display:inline-block;vertical-align:middle;flex-shrink:0;}
    header{background:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    .header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;max-width:1200px;margin:0 auto;}
    .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-text .main{font-size:18px;font-weight:700;color:white;}
    .logo-text .sub{font-size:11px;color:#aab8cc;}
    .page-wrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 24px;}
    .done-card{background:white;border-radius:16px;box-shadow:0 6px 32px rgba(0,0,0,0.11);width:100%;max-width:440px;overflow:hidden;text-align:center;}
    .done-top{background:linear-gradient(135deg,var(--navy),#002060);padding:40px 28px;color:white;}
    .done-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;border:2px solid rgba(255,255,255,0.25);}
    .done-top h1{font-size:22px;font-weight:700;margin-bottom:8px;}
    .done-top p{font-size:13px;color:#aab8cc;line-height:1.5;}
    .done-body{padding:28px 32px 32px;}
    .done-msg{font-size:14px;color:#444;line-height:1.65;margin-bottom:22px;}
    .btn-mypage{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;}
    .btn-mypage:hover{background:#002060;}
    .btn-home{display:inline-block;margin-top:14px;font-size:13px;color:var(--gray-text);text-decoration:none;}
    .btn-home:hover{color:var(--navy);}
  </style>
  <link rel="stylesheet" href="css/mobile.css"/>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
    <symbol id="ic-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></symbol>
    <symbol id="ic-mypage" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
    <symbol id="ic-home" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H5a1 1 0 01-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></symbol>
    <symbol id="ic-topik-logo" viewBox="0 0 44 44"><rect width="44" height="44" rx="8" fill="#CD2E3A"/><text x="22" y="17" text-anchor="middle" fill="white" font-size="9" font-weight="700" font-family="sans-serif">TOPIK</text><line x1="8" y1="21" x2="36" y2="21" stroke="white" stroke-width="1.2" opacity="0.5"/><text x="22" y="33" text-anchor="middle" fill="white" font-size="8" font-weight="600" font-family="sans-serif">MYANMAR</text><circle cx="22" cy="27" r="0" fill="none"/></symbol>
  </svg>
</head>
<body>

<header>
  <div class="header-main">
    <a href="index.html" class="logo">
      <svg width="44" height="44"><use href="#ic-topik-logo"/></svg>
      <div class="logo-text"><div class="main">TOPIK Myanmar</div><div class="sub">တိုပစ် မြန်မာ</div></div>
    </a>
  </div>
</header>

<div class="page-wrap">
  <div class="done-card">
    <div class="done-top">
      <div class="done-icon">
        <svg class="icon" width="40" height="40" color="white"><use href="#ic-check"/></svg>
      </div>
      <h1>시험 접수가 완료되었습니다</h1>
      <p>제출해 주신 원서가 정상적으로 접수되었습니다.</p>
    </div>
    <div class="done-body">
      <p class="done-msg">
        접수번호·심사 상태·수험표 발급 여부는<br/>
        <strong>접수 확인</strong> 메뉴에서 확인할 수 있습니다.
      </p>
      <a href="mypage.html" class="btn-mypage">
        <svg class="icon" width="18" height="18"><use href="#ic-mypage"/></svg>
        접수 확인
      </a>
      <div>
        <a href="index.html" class="btn-home"><svg class="icon" width="14" height="14" style="vertical-align:-2px;margin-right:4px;"><use href="#ic-home"/></svg>메인으로 돌아가기</a>
      </div>
    </div>
  </div>
</div>

</body>
</html>
