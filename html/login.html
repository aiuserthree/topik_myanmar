<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>

  <title>로그인 — TOPIK Myanmar</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#CD2E3A;--navy:#003478;--gold:#C8963E;--gray-bg:#f4f6f9;--gray-light:#e8ecf0;--gray-text:#6b7280;--shadow:0 2px 12px rgba(0,0,0,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-bg);color:#1a1a2e;}
    svg.icon{display:inline-block;vertical-align:middle;flex-shrink:0;}
    header{background:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    .header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;max-width:1200px;margin:0 auto;}
    .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-text .main{font-size:18px;font-weight:700;color:white;}
    .logo-text .sub{font-size:11px;color:#aab8cc;}
    .page-wrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 24px;}
    .login-card{background:white;border-radius:16px;box-shadow:0 6px 32px rgba(0,0,0,0.11);width:100%;max-width:440px;overflow:hidden;}
    .login-card-top{background:linear-gradient(135deg,var(--navy),#002060);padding:36px;text-align:center;color:white;}
    .login-top-icon{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:2px solid rgba(255,255,255,0.2);}
    .login-card-top h1{font-size:22px;font-weight:700;margin-bottom:4px;}
    .login-card-top p{font-size:12px;color:#aab8cc;}
    .login-card-body{padding:32px;}
    .form-group{margin-bottom:16px;}
    .form-group label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:6px;display:flex;align-items:center;gap:5px;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--gray-text);pointer-events:none;}
    .input-wrap input{width:100%;padding:10px 40px 10px 40px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:14px;font-family:inherit;transition:border .2s;}
    .input-wrap input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(0,52,120,0.08);}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray-text);background:none;border:none;padding:0;display:flex;align-items:center;}
    .pw-toggle:hover{color:var(--navy);}
    .login-options{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px;}
    .login-options label{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--gray-text);}
    .login-options label input{accent-color:var(--navy);width:auto;}
    .login-options a{color:var(--navy);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:4px;}
    .login-options a:hover{color:var(--red);}
    .btn-login{width:100%;padding:13px;background:var(--navy);color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn-login:hover{background:#002060;}
    .divider{text-align:center;margin:20px 0;position:relative;}
    .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--gray-light);}
    .divider span{position:relative;background:white;padding:0 12px;font-size:12px;color:var(--gray-text);}
    .signup-prompt{text-align:center;font-size:13px;color:var(--gray-text);}
    .signup-prompt a{color:var(--red);font-weight:600;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
    .error-alert{background:#fff0f1;border:1px solid #fca5a5;border-radius:8px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:none;align-items:center;gap:8px;}
    .error-alert.show{display:flex;}
  </style>

<body>

<header>
  <div class="header-main">
    <a href="index.html" class="logo">
      <svg width="44" height="44"><use href="#ic-topik-logo"/></svg>
      <div class="logo-text"><div class="main">TOPIK Myanmar</div><div class="sub">တိုပစ် မြန်မာ</div></div>
    </a>
  </div>
</header>

<div class="page-wrap">
  <div class="login-card">
    <div class="login-card-top">
      <div class="login-top-icon">
        <svg class="icon" width="36" height="36" color="white"><use href="#ic-login"/></svg>
      </div>
      <h1>로그인</h1>
      <p>TOPIK Myanmar 계정으로 로그인하세요</p>
    </div>
    <div class="login-card-body">
      <div class="error-alert" id="loginError">
        <svg class="icon" width="16" height="16"><use href="#ic-alert"/></svg>
        이메일 또는 비밀번호가 올바르지 않습니다.
      </div>
      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label><svg class="icon" width="13" height="13" color="var(--gray-text)"><use href="#ic-email"/></svg>이메일 주소</label>
          <div class="input-wrap">
            <span class="input-icon"><svg class="icon" width="16" height="16"><use href="#ic-email"/></svg></span>
            <input type="email" id="loginEmail" placeholder="example@email.com" required/>
          </div>
        </div>
        <div class="form-group">
          <label><svg class="icon" width="13" height="13" color="var(--gray-text)"><use href="#ic-lock"/></svg>비밀번호</label>
          <div class="input-wrap">
            <span class="input-icon"><svg class="icon" width="16" height="16"><use href="#ic-lock"/></svg></span>
            <input type="password" id="loginPw" placeholder="비밀번호 입력" required/>
            <button type="button" class="pw-toggle" onclick="togglePw()" id="pwToggle">
              <svg class="icon" width="16" height="16" id="eyeIcon"><use href="#ic-eye"/></svg>
            </button>
          </div>
        </div>
        <div class="login-options">
          <label><input type="checkbox"/> 로그인 상태 유지</label>
          <a href="#"><svg class="icon" width="13" height="13"><use href="#ic-lock"/></svg>비밀번호 찾기</a>
        </div>
        <button type="submit" class="btn-login">
          <svg class="icon" width="16" height="16"><use href="#ic-login"/></svg>
          로그인
        </button>
      </form>
      <div class="divider"><span>또는</span></div>
      <div class="signup-prompt">
        계정이 없으신가요? <a href="signup.html"><svg class="icon" width="13" height="13"><use href="#ic-signup"/></svg>지금 회원가입</a>
      </div>
    </div>
  </div>
</div>

<script>
  let pwVisible=false;
  function togglePw(){
    const pw=document.getElementById('loginPw');
    const icon=document.getElementById('eyeIcon');
    pwVisible=!pwVisible;
    pw.type=pwVisible?'text':'password';
    icon.querySelector('use').setAttribute('href',pwVisible?'#ic-eye-off':'#ic-eye');
  }
  function doLogin(e){
    e.preventDefault();
    const email=document.getElementById('loginEmail').value;
    const pw=document.getElementById('loginPw').value;
    if(email&&pw){alert('✅ 로그인 성공! 메인 페이지로 이동합니다.');window.location.href='index.html';}
    else{document.getElementById('loginError').classList.add('show');}
  }
</script>
</body>
</html>
