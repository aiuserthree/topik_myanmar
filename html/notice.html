<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>공지사항 — TOPIK Myanmar</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Sans+Myanmar:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    :root{--red:#CD2E3A;--navy:#003478;--gold:#C8963E;--gray-bg:#f4f6f9;--gray-light:#e8ecf0;--gray-text:#6b7280;--shadow:0 2px 12px rgba(0,0,0,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--gray-bg);color:#1a1a2e;}
    svg.icon{display:inline-block;vertical-align:middle;flex-shrink:0;}
    header{background:var(--navy);position:sticky;top:0;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
    .header-main{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;max-width:1200px;margin:0 auto;}
    .logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .logo-text .main{font-size:18px;font-weight:700;color:white;}
    .logo-text .sub{font-size:11px;color:#aab8cc;}
    nav{display:flex;gap:2px;}
    nav a{color:#dce8f5;text-decoration:none;padding:8px 13px;border-radius:6px;font-size:13.5px;font-weight:500;transition:all .2s;display:flex;align-items:center;gap:6px;}
    nav a:hover,nav a.active{background:rgba(255,255,255,0.12);color:white;}
    .header-actions{display:flex;gap:8px;}
    .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .btn-outline{border:1.5px solid #aab8cc;color:#dce8f5;background:transparent;}
    .btn-outline:hover{border-color:white;color:white;}
    .btn-primary{background:var(--red);color:white;}
    /* Page Hero */
    .page-hero{background:linear-gradient(135deg,var(--navy),#002060);color:white;padding:40px 24px;}
    .page-hero-inner{max-width:1200px;margin:0 auto;}
    .breadcrumb{font-size:12px;color:#aab8cc;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
    .breadcrumb a{color:#aab8cc;text-decoration:none;}
    .page-hero h1{font-size:clamp(20px,3.5vw,30px);font-weight:700;display:flex;align-items:center;gap:10px;}
    /* Content */
    .content{max-width:1200px;margin:0 auto;padding:32px 24px;}
    /* Toolbar */
    .board-toolbar{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
    .filter-select{padding:9px 14px;border:1.5px solid var(--gray-light);border-radius:8px;font-size:13px;font-family:inherit;background:white;cursor:pointer;display:flex;align-items:center;gap:6px;}
    .search-box{display:flex;flex:1;min-width:200px;border:1.5px solid var(--gray-light);border-radius:8px;overflow:hidden;background:white;}
    .search-box input{flex:1;padding:9px 14px;border:none;font-size:14px;font-family:inherit;outline:none;}
    .search-box button{padding:9px 14px;background:var(--navy);color:white;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:13px;font-family:inherit;font-weight:600;}
    /* List View */
    .board-wrap{background:white;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
    .board-head{display:grid;grid-template-columns:64px 1fr 120px 80px;background:var(--navy);color:white;}
    .board-head div{padding:12px 16px;font-size:12px;font-weight:700;letter-spacing:.3px;display:flex;align-items:center;gap:5px;}
    .board-row{display:grid;grid-template-columns:64px 1fr 120px 80px;border-bottom:1px solid var(--gray-light);cursor:pointer;transition:background .2s;}
    .board-row:last-child{border-bottom:none;}
    .board-row:hover{background:#f8f9fc;}
    .board-row > div{padding:13px 16px;font-size:14px;display:flex;align-items:center;}
    .col-num{color:var(--gray-text);font-size:13px;justify-content:center;}
    .col-title{gap:8px;flex-wrap:wrap;}
    .col-date{color:var(--gray-text);font-size:13px;display:flex;align-items:center;gap:4px;}
    .col-view{color:var(--gray-text);font-size:13px;justify-content:center;gap:4px;}
    .nbadge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:3px;white-space:nowrap;}
    .nb-new{background:#fff0f1;color:var(--red);}
    .nb-imp{background:#fff8e1;color:#b07800;}
    .nb-gen{background:#f0f4ff;color:var(--navy);}
    /* Pagination */
    .pagination{display:flex;justify-content:center;gap:6px;margin-top:20px;}
    .p-btn{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:600;border:1.5px solid var(--gray-light);background:white;color:var(--navy);transition:all .2s;}
    .p-btn.active{background:var(--navy);color:white;border-color:var(--navy);}
    .p-btn:hover:not(.active){background:#f0f4ff;border-color:var(--navy);}
    /* Detail View */
    #detailView{display:none;}
    .detail-card{background:white;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
    .detail-head{padding:24px 28px;border-bottom:1px solid var(--gray-light);}
    .detail-cat{font-size:12px;color:var(--gray-text);margin-bottom:8px;display:flex;align-items:center;gap:5px;}
    .detail-head h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:12px;line-height:1.4;}
    .detail-meta{display:flex;gap:18px;font-size:13px;color:var(--gray-text);flex-wrap:wrap;}
    .detail-meta span{display:flex;align-items:center;gap:4px;}
    .detail-body{padding:28px;min-height:280px;font-size:14px;line-height:1.85;color:#333;}
    .detail-body p{margin-bottom:14px;}
    .detail-body strong{color:var(--navy);}
    .detail-attach{padding:18px 28px;background:#fafbfc;border-top:1px solid var(--gray-light);}
    .detail-attach h4{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
    .attach-item{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;background:white;border:1.5px solid var(--gray-light);border-radius:8px;font-size:13px;color:var(--navy);text-decoration:none;margin-right:8px;margin-bottom:8px;transition:all .2s;}
    .attach-item:hover{border-color:var(--navy);background:#f0f4ff;}
    .detail-nav{padding:16px 28px;display:flex;justify-content:space-between;border-top:1px solid var(--gray-light);}
    .nav-btn{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-light);background:white;color:var(--navy);font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:6px;}
    .nav-btn:hover{border-color:var(--navy);background:#f0f4ff;}
    /* Footer */
    footer{background:#1a2a4a;color:#aab8cc;padding:32px 24px;}
    .footer-bottom{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:12px;}
  </style>

<script>
  function syncNoticeCategoryFilter(){
    if(!window.ContentStore)return;
    var sel=document.getElementById('noticeCatFilter');
    if(!sel)return;
    var cur=sel.value;
    var cats=ContentStore.getNoticeCategories();
    sel.innerHTML='';
    var o0=document.createElement('option');
    o0.value='all';
    o0.textContent='전체 카테고리';
    sel.appendChild(o0);
    cats.forEach(function(c){
      var o=document.createElement('option');
      o.value=c.id;
      o.textContent=c.label;
      sel.appendChild(o);
    });
    var ok=(cur==='all')||cats.some(function(c){ return c.id===cur; });
    sel.value=ok?cur:'all';
    applyNoticeFilters();
  }
  document.addEventListener('DOMContentLoaded',function(){
    if(window.TMI18N) TMI18N.boot();
    syncNoticeCategoryFilter();
    renderNoticeBoard();
  });
  window.addEventListener('topik-content-change',function(){
    syncNoticeCategoryFilter();
    renderNoticeBoard();
  });
  window.addEventListener('storage',function(e){
    if(window.ContentStore&&e.key===ContentStore.STORAGE_KEY){
      syncNoticeCategoryFilter();
      renderNoticeBoard();
    }
  });
</script>
<script>
  function fmtNoticeViews(n){
    var x=Number(n)||0;
    return String(x).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  }
  function noticeBadgeHtml(catId){
    if(catId==='new'){
      return '<span class="nbadge nb-new"><svg class="icon" width="9" height="9"><use href="#ic-notice"/></svg>NEW</span>';
    }
    if(catId==='imp'){
      return '<span class="nbadge nb-imp"><svg class="icon" width="9" height="9"><use href="#ic-alert"/></svg>중요</span>';
    }
    return '<span class="nbadge nb-gen"><svg class="icon" width="9" height="9"><use href="#ic-rules"/></svg>일반</span>';
  }
  var currentNoticeId=null;
  function renderNoticeBoard(){
    if(!window.ContentStore)return;
    var wrap=document.getElementById('noticeBoardRows');
    if(!wrap)return;
    var items=ContentStore.getNoticeItems();
    wrap.innerHTML='';
    var total=items.length;
    items.forEach(function(it,i){
      var row=document.createElement('div');
      row.className='board-row';
      row.setAttribute('data-cat',it.catId);
      row.setAttribute('data-notice-id',it.id);
      row.onclick=function(){ showNoticeDetail(it.id); };
      row.innerHTML='<div class="col-num">'+(total-i)+'</div>'+
        '<div class="col-title">'+noticeBadgeHtml(it.catId)+escapeNotice(it.title)+'</div>'+
        '<div class="col-date"><svg class="icon" width="11" height="11"><use href="#ic-calendar"/></svg>'+escapeNotice(it.date)+'</div>'+
        '<div class="col-view"><svg class="icon" width="11" height="11"><use href="#ic-eye"/></svg>'+fmtNoticeViews(it.views)+'</div>';
      wrap.appendChild(row);
    });
    applyNoticeFilters();
  }
  function escapeNotice(str){
    if(str==null)return'';
    var d=document.createElement('div');
    d.textContent=String(str);
    return d.innerHTML;
  }
  function showNoticeDetail(id){
    if(!window.ContentStore)return;
    var items=ContentStore.getNoticeItems();
    var it=items.find(function(x){ return x.id===id; });
    if(!it)return;
    currentNoticeId=id;
    document.getElementById('detailCatText').textContent='공지사항 · '+ContentStore.labelForNoticeCatId(it.catId);
    document.getElementById('detail-title').textContent=it.title;
    document.getElementById('detailDate').textContent=it.date;
    document.getElementById('detailViews').textContent='조회 '+fmtNoticeViews(it.views);
    document.getElementById('detail-content').innerHTML=it.bodyHtml||'';
    var attW=document.getElementById('detailAttachWrap');
    var attL=document.getElementById('detailAttachList');
    var files=Array.isArray(it.attachments)?it.attachments:[];
    if(attW&&attL){
      if(files.length){
        attW.style.display='block';
        attL.innerHTML=files.map(function(a){
          var href=escapeNotice(a.href||'#');
          var name=escapeNotice(a.name||'파일');
          return '<a href="'+href+'" class="attach-item"><svg class="icon" width="13" height="13" color="var(--red)"><use href="#ic-download"/></svg>'+name+'</a>';
        }).join('');
      }else{
        attW.style.display='none';
        attL.innerHTML='';
      }
    }
    document.getElementById('listView').style.display='none';
    document.getElementById('detailView').style.display='block';
    window.scrollTo({top:0,behavior:'smooth'});
  }
  function showList(){
    document.getElementById('detailView').style.display='none';
    document.getElementById('listView').style.display='block';
    currentNoticeId=null;
  }
  function applyNoticeFilters(){
    var fvEl=document.getElementById('noticeCatFilter');
    var fv=fvEl?fvEl.value:'all';
    var qEl=document.getElementById('searchInput');
    var q=qEl?(qEl.value||'').toLowerCase():'';
    document.querySelectorAll('#noticeBoardRows .board-row').forEach(function(row){
      var catOk=(fv==='all'||row.dataset.cat===fv);
      var textOk=!q||row.textContent.toLowerCase().includes(q);
      row.style.display=(catOk&&textOk)?'':'none';
    });
  }
  function searchNotice(){
    applyNoticeFilters();
  }
</script>
